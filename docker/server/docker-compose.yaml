services:
  nextunnel-server:
    build: ../..
    container_name: nextunnel-server
    restart: unless-stopped
    network_mode: host
    environment:
      - NEXTUNNEL_TYPE=server
    volumes:
      - ./volumes/nextunnel/conf/nextunnel-server.toml:/app/conf/nextunnel-server.toml
      - ./volumes/nextunnel/logs:/app/logs
      - ./volumes/nextunnel/certs:/app/certs
    depends_on:
      postgresql:
        condition: service_healthy
  postgresql:
    image: postgres:18.4
    container_name: nextunnel-server-postgresql
    restart: unless-stopped
    networks:
      - net_nextunnel
    ports:
      - ${DB_PORT:-5432}:5432
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nextunnel}
      POSTGRES_DB: ${DB_DATABASE:-nextunnel}
    command:
      - postgres
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-100}
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-128MB}
      - -c
      - work_mem=${PG_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-64MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-4096MB}
    volumes:
      - ./volumes/postgresql:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-nextunnel}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
networks:
  net_nextunnel:
    driver: bridge
