services:
  nextunnel-server:
    build: ..
    container_name: nextunnel-server
    restart: always
    env_file:
      - .env
    network_mode: host
    volumes:
      - ./volumes/nextunnel/config:/usr/local/nextunnel/config
      - ./volumes/nextunnel/certs:/usr/local/nextunnel/certs
      - ./volumes/nextunnel/logs:/usr/local/nextunnel/logs
    depends_on:
      - db
  db:
    image: postgres:18.4
    container_name: nextunnel-server-db
    restart: always
    ports:
      - ${DB_PORT}:5432
    environment:
      PGUSER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      PGDATA: '/var/lib/postgresql/data'
      POSTGRES_MAX_CONNECTIONS: '100'
      POSTGRES_SHARED_BUFFERS: '128MB'
      POSTGRES_WORK_MEM: '4MB'
      POSTGRES_MAINTENANCE_WORK_MEM: '64MB'
      POSTGRES_EFFECTIVE_CACHE_SIZE: '4096MB'
    command: >
      postgres -c 'max_connections=100'
                   -c 'shared_buffers=128MB'
                   -c 'work_mem=4MB'
                   -c 'maintenance_work_mem=64MB'
                   -c 'effective_cache_size=4096MB'
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 1s
      timeout: 3s
      retries: 30
