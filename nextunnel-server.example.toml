[server]
port = 25930

[server_web]
host = "127.0.0.1"
port = 25001

[cert]
host = "127.0.0.1"
dir = "certs" # If using Docker to start, this parameter must be in "certs"

[database]
host = "127.0.0.1"
port = 5432
username = "postgres"
password = "nextunnel"
db = "nextunnel"
sslmode = "disable"

[ip_location]
api_key = "YOUR_API_KEY"

[logs]
file = "logs/nextunnel-server.log" # If using Docker to start, this parameter must be in "logs/nextunnel-server.log"
level = "info" # allowed: info, warn, error
maxSize = "100MB"
maxBackups = 30
maxAge = 7
