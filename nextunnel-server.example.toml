[server]
port = 25930

[server_web]
host = "127.0.0.1"
port = 25001

[cert]
host = "127.0.0.1"
dir = "certs" # If using Docker to start, this parameter must be in /etc/nextunnel/certs

[database]
host = "127.0.0.1"
port = 5432
username = "postgres"
password = "nextunnel"
db = "nextunnel"
sslmode = "disable"

[ip_location]
api_key = "YOUR_API_KEY" # Required. Xiaotiancai Tech IP location API key

[logs]
file = "logs/nextunnel-server.log" # If using Docker to start, this parameter must be in /var/log/nextunnel/nextunnel-server.log
level = "info" # allowed: info, warn, error
maxSize = "100MB"
maxBackups = 30
maxAge = 7
