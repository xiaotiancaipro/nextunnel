[server]
addr = "127.0.0.1"
port = 25930

[client]
id = ""

[logs]
file = "logs/nextunnel-client.log"
level = "info"

[tls]
ca_file = "certs/ca.crt"
cert_file = "certs/client.crt"
key_file = "certs/client.key"

[[proxies]]
name = "ssh"
type = "tcp"
local_ip = "127.0.0.1"
local_port = 22
remote_port = 8022
