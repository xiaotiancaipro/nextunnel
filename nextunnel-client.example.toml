[server]
host = "127.0.0.1"
port = 25930

[client]
id = ""

[cert]
ca_file = "certs/ca.crt"
cert_file = "certs/client.crt"
key_file = "certs/client.key"

[logs]
file = "logs/nextunnel-client.log"
level = "info"
maxSize = "100MB"
maxBackups = 30
maxAge = 7

[timezone]
location = "Asia/Shanghai"

[[proxies]]
name = "ssh"
type = "tcp"
local_ip = "127.0.0.1"
local_port = 22
remote_port = 8022
